<section class="mx-auto max-w-3xl px-6 py-16">
  <div class="flex items-center gap-3">
    <h1 class="text-3xl font-bold tracking-tight text-slate-900">Angular 22 SPA</h1>
    <span
      class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-0.5 text-xs font-medium ring-1"
      [class.bg-green-50]="health() === 'ok'"
      [class.text-green-700]="health() === 'ok'"
      [class.ring-green-200]="health() === 'ok'"
      [class.bg-amber-50]="health() !== 'ok'"
      [class.text-amber-700]="health() !== 'ok'"
      [class.ring-amber-200]="health() !== 'ok'"
    >
      API: {{ health() }}
    </span>
  </div>

  <p class="mt-4 text-slate-600">
    A zoneless, standalone Angular app served at <code class="rounded bg-slate-100 px-1.5 py-0.5 text-sm">/app/</code>.
    The button below calls the Elysia backend at <code class="rounded bg-slate-100 px-1.5 py-0.5 text-sm">/api/hello</code>
    via Angular's <code class="rounded bg-slate-100 px-1.5 py-0.5 text-sm">HttpClient</code>.
  </p>

  <div class="mt-8 rounded-2xl bg-white p-6 ring-1 ring-slate-200">
    <button
      type="button"
      (click)="greet()"
      [disabled]="loading()"
      class="inline-flex items-center rounded-lg bg-brand-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-brand-700 disabled:opacity-60 transition-colors"
    >
      {{ loading() ? 'Calling API…' : 'Call /api/hello' }}
    </button>

    @if (message(); as msg) {
      <p class="mt-4 rounded-lg bg-brand-50 px-4 py-3 text-sm text-brand-800 ring-1 ring-brand-100">
        {{ msg }}
      </p>
    }
  </div>
</section>
